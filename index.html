<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPhotoPuzzle | Деревянные пазлы в Перми</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; background: #fff; color: #1f2937; }
        .glass-nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); position: fixed; width: 100%; z-index: 50; }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -0.05em; }
        .logo span { color: #005BFF; }
        #puzzle-3d-viewport { width: 100%; height: 520px; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .control-buttons { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .control-btn {
            padding: 14px 28px;
            border-radius: 9999px;
            font-weight: 700;
            background: #005BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        .control-btn:hover { background: #0048cc; }
    </style>
</head>
<body>

    <nav class="glass-nav py-5 border-b">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <div class="logo">MyPhoto<span>Puzzle</span></div>
            <a href="#order" class="bg-[#005BFF] text-white px-6 py-3 rounded-full font-bold">Заказать</a>
        </div>
    </nav>

    <section class="pt-28 pb-16 px-6">
        <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
            <div>
                <h1 class="text-5xl font-bold leading-tight">Деревянные пазлы<br>с характером</h1>
                <p class="mt-6 text-lg text-gray-600">Производство в Перми • Лазерная резка • Яркая печать</p>
            </div>
            <div>
                <div id="puzzle-3d-viewport"></div>
                <div class="control-buttons" id="control-buttons"></div>
            </div>
        </div>
    </section>

    <!-- Твой #order секция / футер -->
    <section id="order" class="py-20 bg-gray-900 text-white text-center">
        <div class="max-w-md mx-auto px-6">
            <h2 class="text-4xl font-bold mb-8">Свяжитесь с мастером</h2>
            <a href="tel:+79000000000" class="inline-flex items-center gap-3 bg-white text-gray-900 px-8 py-4 rounded-2xl font-bold text-xl">
                📞 Позвонить
            </a>
            <p class="mt-10 text-gray-400">г. Пермь • Ответим быстро</p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const start3D = () => {
            const container = document.getElementById('puzzle-3d-viewport');
            if (!container) return console.error("3D контейнер не найден");

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.7 });

            group.add(new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.4), mat));

            // Простые выступы
            const knob = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 32), mat);
            knob.rotation.x = Math.PI / 2;
            knob.position.set(1.6, 0, 0);
            group.add(knob);

            scene.add(group);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.PointLight(0x005BFF, 2, 20);
            light.position.set(5, 5, 8);
            scene.add(light);

            camera.position.z = 8;

            let dragging = false, prevX = 0, prevY = 0;

            container.addEventListener('mousedown', () => dragging = true);
            window.addEventListener('mouseup', () => dragging = false);
            container.addEventListener('mousemove', e => {
                if (dragging) {
                    group.rotation.y += (e.offsetX - prevX) * 0.008;
                    group.rotation.x += (e.offsetY - prevY) * 0.008;
                }
                prevX = e.offsetX;
                prevY = e.offsetY;
            });

            const animate = () => {
                requestAnimationFrame(animate);
                if (!dragging) group.rotation.y += 0.003;
                renderer.render(scene, camera);
            };
            animate();

            // Добавляем кнопки
            const btnDiv = document.getElementById('control-buttons');
            if (btnDiv) {
                btnDiv.innerHTML = `
                    <button onclick="changeWoodColor()" class="control-btn">🌳 Сменить цвет</button>
                    <button onclick="zoomInPuzzle()" class="control-btn">🔍 Посмотреть ближе</button>
                `;
            }
        };

        window.onload = start3D;

        window.changeWoodColor = () => alert("Скоро будет смена цвета дерева");
        window.zoomInPuzzle = () => alert("Зажми мышку на пазле и крути");
    </script>
</body>
</html>
