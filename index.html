<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPhotoPuzzle | Деревянные пазлы Пермь</title>
    
<script>
AOS.init({ duration: 1000, once: true });

const start3D = () => {
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const group = new THREE.Group();
    
    // Основная деревянная пластина
    const woodMat = new THREE.MeshStandardMaterial({ 
        color: 0xcdab8f, 
        roughness: 0.65, 
        metalness: 0.05 
    });
    
    const base = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.35), woodMat);
    
    // Классические пазловые элементы
    const tabShape = new THREE.Shape();
    tabShape.moveTo(-0.8, 0.8);
    tabShape.lineTo(-0.8, 1.4);
    tabShape.bezierCurveTo(-1.3, 1.8, -1.3, 2.2, -0.8, 2.4);
    tabShape.lineTo(0.8, 2.4);
    tabShape.bezierCurveTo(1.3, 2.2, 1.3, 1.8, 0.8, 1.4);
    tabShape.lineTo(0.8, 0.8);
    
    const extrudeSettings = { depth: 0.35, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 };
    const tabGeo = new THREE.ExtrudeGeometry(tabShape, extrudeSettings);
    
    const tab1 = new THREE.Mesh(tabGeo, woodMat);
    tab1.position.set(0, 1.7, 0);
    const tab2 = new THREE.Mesh(tabGeo, woodMat);
    tab2.rotation.z = Math.PI;
    tab2.position.set(0, -1.7, 0);
    
    group.add(base, tab1, tab2);
    scene.add(group);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const light = new THREE.PointLight(0xffddaa, 1.8, 20);
    light.position.set(5, 8, 6);
    scene.add(light);
    const light2 = new THREE.PointLight(0x99ccff, 1, 20);
    light2.position.set(-5, -3, 8);
    scene.add(light2);

    camera.position.set(2, 3, 7);
    camera.lookAt(0, 0, 0);

    let drag = false, prevX = 0, prevY = 0;
    container.addEventListener('mousedown', () => drag = true);
    window.addEventListener('mouseup', () => drag = false);
    container.addEventListener('mousemove', e => {
        if (!drag) return;
        group.rotation.y += (e.offsetX - prevX) * 0.005;
        group.rotation.x += (e.offsetY - prevY) * 0.005;
        prevX = e.offsetX; prevY = e.offsetY;
    });

    const animate = () => {
        requestAnimationFrame(animate);
        if (!drag) group.rotation.y += 0.003;
        renderer.render(scene, camera);
    };
    animate();

    // Кнопки
    const btnContainer = document.createElement('div');
    btnContainer.className = 'flex justify-center gap-4 mt-6';
    btnContainer.innerHTML = `
        <button onclick="changeWoodColor()" class="bg-amber-700 text-white px-8 py-3 rounded-2xl text-sm font-bold">Другое дерево</button>
        <button onclick="zoomPuzzle()" class="bg-slate-800 text-white px-8 py-3 rounded-2xl text-sm font-bold">Посмотреть ближе</button>
    `;
    container.parentNode.appendChild(btnContainer);
};

window.onload = start3D;

window.changeWoodColor = () => {
    alert('Здесь можно менять цвет дерева — добавлю в следующей версии 😉');
};

window.zoomPuzzle = () => {
    alert('Кликни и покрути мышкой, пазл уже в 3D!');
};
</script>
</body>
</html>
