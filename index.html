<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPhotoPuzzle | Деревянные пазлы в Перми</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            margin: 0; 
            background: #fff; 
            color: #1f2937; 
        }
        .glass-nav { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px); 
            position: fixed; 
            width: 100%; 
            z-index: 50; 
            border-bottom: 1px solid #eee;
        }
        .logo { 
            font-size: 2.1rem; 
            font-weight: 900; 
            letter-spacing: -0.04em; 
        }
        .logo span { color: #005BFF; }
        #puzzle-3d-viewport { 
            width: 100%; 
            height: 520px; 
            background: #f8f9fa; 
            border-radius: 28px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        .control-buttons {
            margin-top: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .control-btn {
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-wood { background: #d97706; color: white; }
        .btn-wood:hover { background: #b45309; }
        .btn-blue { background: #005BFF; color: white; }
        .btn-blue:hover { background: #0048cc; }
    </style>
</head>
<body>

    <nav class="glass-nav py-5">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <div class="logo">MyPhoto<span>Puzzle</span></div>
            <a href="#order" class="bg-[#005BFF] text-white px-8 py-3 rounded-full font-bold">Заказать</a>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-2 gap-12 items-center">
            <div>
                <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6">
                    Деревянные пазлы,<br>которые собирают эмоции
                </h1>
                <p class="text-xl text-gray-600">Производство в Перми • Натуральная берёза • Премиум качество</p>
            </div>
            
            <div>
                <div id="puzzle-3d-viewport"></div>
                <div class="control-buttons" id="control-buttons"></div>
            </div>
        </div>
    </section>

    <section id="order" class="py-24 bg-gray-900 text-white text-center">
        <div class="max-w-md mx-auto px-6">
            <h2 class="text-4xl font-bold mb-6">Свяжитесь с нами</h2>
            <a href="tel:+79000000000" class="inline-block bg-white text-gray-900 px-10 py-5 rounded-2xl font-bold text-xl mb-8">
                📞 Позвонить мастеру
            </a>
            <p class="text-gray-400">Пермь • Ответим быстро</p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const init3D = () => {
            const container = document.getElementById('puzzle-3d-viewport');
            if (!container) return console.error("Контейнер 3D не найден");

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xd2b48c, 
                roughness: 0.75 
            });

            // Основная пластина
            const base = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.45), mat);
            group.add(base);

            // Выступы пазла
            const knobGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.45, 32);
            const knob1 = new THREE.Mesh(knobGeo, mat);
            knob1.rotation.x = Math.PI / 2;
            knob1.position.set(1.6, 0, 0);
            group.add(knob1);

            const knob2 = knob1.clone();
            knob2.position.set(-1.6, 0, 0);
            group.add(knob2);

            scene.add(group);
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            const light = new THREE.PointLight(0x005BFF, 2.5, 30);
            light.position.set(6, 8, 10);
            scene.add(light);

            camera.position.set(0, 1, 9);
            camera.lookAt(0, 0, 0);

            let isDragging = false;
            let previousMouse = { x: 0, y: 0 };

            container.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            container.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                group.rotation.y += (e.offsetX - previousMouse.x) * 0.008;
                group.rotation.x += (e.offsetY - previousMouse.y) * 0.008;
                previousMouse.x = e.offsetX;
                previousMouse.y = e.offsetY;
            });

            const animate = () => {
                requestAnimationFrame(animate);
                if (!isDragging) group.rotation.y += 0.003;
                renderer.render(scene, camera);
            };
            animate();

            // Кнопки
            const btnContainer = document.getElementById('control-buttons');
            if (btnContainer) {
                btnContainer.innerHTML = `
                    <button onclick="changeWoodColor()" class="control-btn btn-wood">🌳 Сменить цвет дерева</button>
                    <button onclick="zoomInPuzzle()" class="control-btn btn-blue">🔍 Посмотреть ближе</button>
                `;
            }
        };

        window.onload = init3D;

        window.changeWoodColor = () => alert("В следующей версии можно будет менять цвет дерева");
        window.zoomInPuzzle = () => alert("Зажми левую кнопку мыши на пазле и крути в разные стороны");
    </script>
</body>
</html>
