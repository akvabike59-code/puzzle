<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPhotoPuzzle | Деревянные пазлы в Перми</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #fff; 
            color: #1f2937; 
            line-height: 1.5;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #eee;
            z-index: 100;
            padding: 1rem 0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        
        .hero {
            padding-top: 120px;
            padding-bottom: 80px;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            align-items: center;
        }
        @media (min-width: 768px) {
            .hero-grid { grid-template-columns: 1fr 1fr; }
        }
        
        #puzzle-3d-viewport {
            width: 100%;
            height: 520px;
            background: #f8f9fa;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .control-buttons {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .control-btn {
            padding: 16px 32px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-wood { background: #d97706; color: white; }
        .btn-wood:hover { background: #b45309; transform: translateY(-2px); }
        .btn-blue { background: #005BFF; color: white; }
        .btn-blue:hover { background: #0048cc; transform: translateY(-2px); }
        
        #order {
            background: #111827;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="container flex justify-between items-center">
            <div class="logo text-3xl font-black tracking-tighter">
                MyPhoto<span style="color:#005BFF">Puzzle</span>
            </div>
            <a href="#order" class="bg-[#005BFF] text-white px-8 py-3.5 rounded-full font-bold text-sm hover:bg-blue-700 transition">Заказать</a>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="hero-grid">
                <div>
                    <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6">
                        Деревянные пазлы,<br>которые собирают эмоции
                    </h1>
                    <p class="text-xl text-gray-600 mb-8">
                        Производство в Перми • Натуральная берёза • Лазерная резка
                    </p>
                </div>
                
                <div>
                    <div id="puzzle-3d-viewport"></div>
                    <div class="control-buttons" id="control-buttons"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="order">
        <div class="container">
            <h2 class="text-4xl font-bold mb-8">Свяжитесь с мастером</h2>
            <a href="tel:+79000000000" 
               class="inline-flex items-center gap-4 bg-white text-gray-900 px-10 py-5 rounded-2xl font-bold text-xl hover:scale-105 transition">
                📞 Позвонить
            </a>
            <p class="mt-10 text-gray-400">г. Пермь, Индустриальный район • Ответим быстро</p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const init3D = () => {
            const container = document.getElementById('puzzle-3d-viewport');
            if (!container) return;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(48, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const group = new THREE.Group();
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xd2b48c, 
                roughness: 0.75, 
                metalness: 0.05 
            });

            // Основание пазла
            const base = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.45), material);
            group.add(base);

            // Выступы
            const tabGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.45, 32);
            const tab1 = new THREE.Mesh(tabGeo, material);
            tab1.rotation.x = Math.PI / 2;
            tab1.position.set(1.7, 0, 0);
            group.add(tab1);

            const tab2 = tab1.clone();
            tab2.position.set(-1.7, 0, 0);
            group.add(tab2);

            scene.add(group);
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            const pointLight = new THREE.PointLight(0x005BFF, 2.5, 50);
            pointLight.position.set(8, 10, 10);
            scene.add(pointLight);

            camera.position.set(0, 2, 9);
            camera.lookAt(0, 0, 0);

            let dragging = false;
            let prev = { x: 0, y: 0 };

            container.addEventListener('mousedown', () => dragging = true);
            window.addEventListener('mouseup', () => dragging = false);
            container.addEventListener('mousemove', (e) => {
                if (dragging) {
                    group.rotation.y += (e.offsetX - prev.x) * 0.009;
                    group.rotation.x += (e.offsetY - prev.y) * 0.009;
                }
                prev.x = e.offsetX;
                prev.y = e.offsetY;
            });

            const animate = () => {
                requestAnimationFrame(animate);
                if (!dragging) group.rotation.y += 0.0035;
                renderer.render(scene, camera);
            };
            animate();

            // Кнопки
            const btns = document.getElementById('control-buttons');
            if (btns) {
                btns.innerHTML = `
                    <button onclick="changeWoodColor()" class="control-btn btn-wood">🌳 Сменить цвет дерева</button>
                    <button onclick="zoomInPuzzle()" class="control-btn btn-blue">🔍 Посмотреть ближе</button>
                `;
            }
        };

        window.onload = init3D;

        window.changeWoodColor = () => alert("Скоро здесь будет выбор цвета дерева (светлый / тёмный / орех)");
        window.zoomInPuzzle = () => alert("Зажми левую кнопку мыши на пазле и крути в разные стороны");
    </script>
</body>
</html>
