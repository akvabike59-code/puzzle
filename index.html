<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Производство уникальных деревянных пазлов в Перми. Пазлы по вашим фото на заказ.">
    <title>MyPhotoPuzzle | Деревянные пазлы в Перми</title>
  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --ozon-blue: #005BFF;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: #ffffff;
            color: #1f2937;
            line-height: 1.6;
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
        }
        
        .logo {
            font-size: 1.95rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        
        .btn-ozon {
            background-color: var(--ozon-blue);
            color: white;
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        
        .btn-ozon:hover {
            background-color: #0048cc;
            transform: translateY(-2px);
        }
        
        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgb(0 91 255 / 0.25);
        }
        
        #puzzle-3d-viewport {
            border-radius: 3rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        
        .control-btn {
            padding: 14px 28px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- Навбар -->
    <nav class="glass-nav fixed w-full z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="logo font-black italic uppercase tracking-tighter">
                MyPhoto<span class="text-[#005BFF]">Puzzle</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#ozon-catalog" class="hover:text-[#005BFF] transition">На Ozon</a>
                <a href="#delivery" class="hover:text-[#005BFF] transition">Доставка</a>
                <a href="#calc" class="hover:text-[#005BFF] transition">Расчёт</a>
            </div>
            <a href="#order" class="btn-ozon text-sm">Заказать</a>
        </div>
    </nav>

    <!-- Hero с 3D -->
    <section class="pt-32 pb-24">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
            <div>
                <h1 class="text-5xl md:text-7xl font-extrabold leading-tight mb-6">
                    Деревянные пазлы,<br>которые собирают эмоции
                </h1>
                <p class="text-xl text-gray-600 mb-10">Премиум качество из натуральной берёзы. Производство в Перми.</p>
                <a href="#ozon-catalog" class="btn-ozon inline-block text-lg">Смотреть на Ozon</a>
            </div>
            <div>
                <div id="puzzle-3d-viewport" class="w-full h-[520px] bg-white"></div>
                
                <!-- Кнопки под 3D -->
                <div id="puzzle-buttons" class="flex flex-wrap justify-center gap-4 mt-8"></div>
            </div>
        </div>
    </section>

    <!-- Остальной контент (ozon-catalog, отзывы, доставка и т.д.) можешь оставить из предыдущей версии -->

    <!-- Плавающая кнопка -->
    <div class="fixed bottom-8 right-8 z-[100]">
        <a href="tel:+79000000000" class="w-16 h-16 bg-[#005BFF] text-white rounded-full flex items-center justify-center text-3xl shadow-2xl hover:scale-110 transition">
            📞
        </a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // ==================== 3D + Кнопки ====================
        const start3D = () => {
            const container = document.getElementById('puzzle-3d-viewport');
            if (!container) return;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const group = new THREE.Group();
            const woodMat = new THREE.MeshStandardMaterial({ 
                color: 0xd2b48c, 
                roughness: 0.72, 
                metalness: 0.08 
            });

            const base = new THREE.Mesh(new THREE.BoxGeometry(3.9, 3.9, 0.42), woodMat);
            group.add(base);

            const tabShape = new THREE.Shape();
            tabShape.moveTo(-0.75, 0.75);
            tabShape.lineTo(-0.75, 1.5);
            tabShape.bezierCurveTo(-1.3, 1.8, -1.3, 2.3, -0.75, 2.5);
            tabShape.lineTo(0.75, 2.5);
            tabShape.bezierCurveTo(1.3, 2.3, 1.3, 1.8, 0.75, 1.5);
            tabShape.lineTo(0.75, 0.75);

            const extrudeSettings = { depth: 0.42, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 };
            const tabGeo = new THREE.ExtrudeGeometry(tabShape, extrudeSettings);

            const tab1 = new THREE.Mesh(tabGeo, woodMat);
            tab1.position.set(0, 1.7, 0);
            group.add(tab1);

            const tab2 = new THREE.Mesh(tabGeo, woodMat);
            tab2.rotation.z = Math.PI;
            tab2.position.set(0, -1.7, 0);
            group.add(tab2);

            scene.add(group);
            scene.add(new THREE.AmbientLight(0xffffff, 0.85));

            const light1 = new THREE.PointLight(0xffffff, 2.8, 50);
            light1.position.set(8, 10, 6);
            scene.add(light1);

            const light2 = new THREE.PointLight(0x005BFF, 1.6, 50);
            light2.position.set(-7, -6, 12);
            scene.add(light2);

            camera.position.set(2, 2.8, 8.5);
            camera.lookAt(0, 0, 0);

            let dragging = false;
            let prev = { x: 0, y: 0 };

            container.addEventListener('mousedown', () => dragging = true);
            window.addEventListener('mouseup', () => dragging = false);
            container.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                group.rotation.y += (e.offsetX - prev.x) * 0.008;
                group.rotation.x += (e.offsetY - prev.y) * 0.008;
                prev.x = e.offsetX;
                prev.y = e.offsetY;
            });

            const animate = () => {
                requestAnimationFrame(animate);
                if (!dragging) group.rotation.y += 0.002;
                renderer.render(scene, camera);
            };
            animate();

            // Создаём кнопки
            const btnContainer = document.getElementById('puzzle-buttons');
            if (btnContainer) {
                btnContainer.innerHTML = `
                    <button onclick="changeWoodColor()" class="control-btn bg-amber-700 hover:bg-amber-600 text-white">
                        🌳 Сменить цвет дерева
                    </button>
                    <button onclick="zoomInPuzzle()" class="control-btn bg-[#005BFF] hover:bg-blue-700 text-white">
                        🔍 Посмотреть ближе
                    </button>
                `;
            }
        };

        window.onload = start3D;

        window.changeWoodColor = () => alert('Скоро здесь будет выбор цвета дерева');
        window.zoomInPuzzle = () => alert('Зажми мышку на пазле и крути в разные стороны');
    </script>
</body>
</html>
